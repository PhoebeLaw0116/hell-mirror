        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        @keyframes quake { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-3px, -2px); } 100% { transform: translate(1px, 2px); } }
        .shaking { animation: quake 0.1s infinite; }

        .app-container { width: 100%; max-width: 414px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .energy-bar { background: var(--accent); color: white; width: 100%; padding: 12px; border-radius: 25px; text-align: center; font-weight: bold; margin-bottom: 20px; }
        
        .gender-selector { display: flex; gap: 10px; width: 100%; margin-bottom: 20px; }
        .gender-btn { flex: 1; padding: 15px; border-radius: 15px; border: 2px solid var(--accent); background: #fff; color: var(--accent); font-weight: 900; cursor: pointer; }
        .gender-btn.active { background: var(--accent); color: #fff; }

        /* 【紅色圈】💔 分手重新計劃 */
        .day-box { width: 100%; border: 2px dashed var(--accent); border-radius: 30px; padding: 20px; text-align: center; background: var(--card); margin-bottom: 20px; }
        .day-input { width: 120px; border: none; border-bottom: 3px solid var(--accent); background: transparent; color: var(--accent); font-size: 60px; text-align: center; outline: none; }

        .input-card { background: var(--card); width: 100%; border-radius: 25px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; border: none; outline: none; font-size: 16px; background: transparent; resize: none; line-height: 1.6; }
        
        .btn-hell { background: var(--accent); color: white; border: none; width: 100%; padding: 22px; border-radius: 50px; font-size: 20px; font-weight: 900; cursor: pointer; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff3333; z-index: 999; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; overflow-y: auto; }
        #content { font-size: 22px; font-weight: 900; line-height: 1.8; }

    // --- 數據裝載函數 ---
    function loadData(f, m) { femaleTruths = f; maleTruths = m; }

    function setG(v) { g=v; document.getElementById('f').className=v==='F'?'gender-btn active':'gender-btn'; document.getElementById('m').className=v==='M'?'gender-btn active':'gender-btn'; }
    
    function updateUI() {
        const d = parseInt(document.getElementById('days').value) || 0;
        const r = document.documentElement;
        if (d >= 40) {
            r.style.setProperty('--bg', '#000');
            r.style.setProperty('--accent', '#f00');
            r.style.setProperty('--card', '#111');
        } else {
            r.style.setProperty('--bg', '#fff1f4');
            r.style.setProperty('--accent', '#ff66a3');
            r.style.setProperty('--card', '#ffffff');
        }
    }

    function launch() {
        const d = parseInt(document.getElementById('days').value) || 0;
        if (!document.getElementById('msg').value.trim()) return alert("未輸入執迷內容！");
        
        document.getElementById('body').classList.add('shaking');
        let final = "";

        if (d >= 40) {
            final = "你醒下啦，過 40 日根本就係浪費時間，精力，青春。你不如用呢啲時間充實下自己，搵過下家啦，話唔定人哋已經有人接咗手喇。";
        } else {
            const p = g === 'F' ? femaleTruths : maleTruths;
            // 隨機選取 300 句庫內嘅內容
            final = p[Math.floor(Math.random() * p.length)];
        }

        setTimeout(() => {
            document.getElementById('content').innerText = final;
            document.getElementById('overlay').style.display = 'flex';
            energy--;
            document.getElementById('eb').innerText = `✨ 魔法能量：${energy} / 5`;
        }, 200);
    }

    function closeHell() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('body').classList.remove('shaking');
    }
</script>
