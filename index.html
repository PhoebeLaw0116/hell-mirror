<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>公主重生倒數 | Mirror Queen</title>
    <style>
        /* 預設基礎變量 */
        :root {
            --p-ratio: 0; /* 0 為最粉, 1 為最黑 */
            --dynamic-bg: #fff1f4;
            --dynamic-text: #666;
            --dynamic-accent: #ff66a3;
            --dynamic-card: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, "PingFang HK", sans-serif; transition: background 0.3s, color 0.3s; }
        
        body { 
            background: var(--dynamic-bg); 
            background-attachment: fixed;
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: var(--dynamic-text);
        }

        .app-container { width: 100%; max-width: 414px; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }

        /* 能量條 */
        .magic-bar { 
            background: var(--dynamic-accent); 
            color: white; width: 100%; height: 45px; border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 14px; margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 核心倒數框 */
        .rebirth-box { 
            width: 100%; 
            border: 2px dashed var(--dynamic-accent); 
            border-radius: 40px; padding: 25px; 
            background: var(--dynamic-card); 
            text-align: center; margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .countdown-display { color: var(--dynamic-accent); font-size: 65px; font-weight: 200; line-height: 1.1; }
        .date-picker { border: none; color: var(--dynamic-accent); font-size: 13px; text-align: center; width: 100%; outline: none; margin-top: 15px; background: transparent; cursor: pointer; border-top: 1px solid rgba(128,128,128,0.2); padding-top: 10px; }

        .input-card { background: var(--dynamic-card); width: 100%; border-radius: 30px; padding: 25px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        textarea { width: 100%; height: 120px; border: none; font-size: 17px; outline: none; background: transparent; color: var(--dynamic-text); resize: none; }

        .btn-action { background: var(--dynamic-accent); color: white; border: none; padding: 20px; border-radius: 50px; font-size: 18px; font-weight: 800; width: 100%; cursor: pointer; }

        /* 支付與語錄層 */
        #pay-overlay, #truth-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; background: #000; color: white; }
    </style>
</head>
<body id="mainBody">

<div class="app-container">
    <div class="magic-bar" id="energyStatus">✨ 魔法能量：5</div>

    <div class="rebirth-box">
        <div style="font-size:12px; font-weight:800; margin-bottom:10px;" id="boxHint">🎀 距離重生剩餘</div>
        <div class="countdown-display" id="daysLabel">00</div>
        <input type="date" id="targetDate" class="date-picker" onchange="applyTimeErosion()">
    </div>

    <h2 id="titleText" style="margin-bottom:20px; letter-spacing:2px;">公主醒覺系統</h2>

    <div class="input-card">
        <textarea id="userInput" placeholder="輸入你嘅童話幻想..."></textarea>
    </div>

    <button class="btn-action" onclick="checkReality()">🪄 接受現實洗禮</button>
</div>

<!-- 支付牆 -->
<div id="pay-overlay">
    <h2 style="color:red;">能量已枯竭</h2>
    <p>日期愈近，代價愈重。請支付以換取最後嘅清醒。</p>
    <img src="payme.png.jpeg" style="width:200px; border:2px solid white; margin:20px 0;">
    <input type="file" id="upload" style="display:none" onchange="document.getElementById('subBtn').disabled=false">
    <label for="upload" style="background:#333; padding:15px; border-radius:10px; width:100%; display:block;">📸 上傳過數截圖</label>
    <button id="subBtn" class="btn-action" style="margin-top:20px;" onclick="resetEnergy()" disabled>提交核實</button>
</div>

<!-- 語錄層 -->
<div id="truth-overlay" onclick="this.style.display='none'">
    <div id="truth-content" style="font-size:24px; font-weight:900; line-height:1.6;"></div>
    <div style="margin-top:50px; font-size:10px; color:#444;">點擊畫面 回到現實</div>
</div>

<script>
    let usedCount = parseInt(localStorage.getItem('mq_used')) || 0;
    const maxDays = 30; // 預設 30 日開始變色

    // 語錄庫 (純廣東話，無數字)
    const truths = [
        "佢唔係忙，佢只係唔想理你呢個廢物。", "你以為係深情？喺佢眼中係騷擾呀。", "望下塊鏡，你宜家個樣真係好卑微。", "人哋一早換咗新伴侶，得你仲喺度守墓。", "佢連分手都廢事講，就係想你自己消失。", "你嘅執著，對佢嚟講只係負擔。", "佢宜家同第個打得火熱，你仲喺度凝住佢？", "你只係佢無聊時嘅消遣，唔好當自己係主角。", "再送多一條訊息，你就係狗。", "醒啦，佢無咗你生活得仲精彩。", "你嘅付出係你自願，人哋無義務要還。", "佢嘅冷暴力，就係想你自己識趣走人。", "你以為嘅回憶，人哋一早掉咗落垃圾桶。", "佢連頭像都換咗，你仲喺度解讀佢個簽名？", "唔好再等喇，佢根本無打算搵返你。", "佢唔覆你，係因為佢正同緊更重要嘅人傾偈。", "你嘅自我感動，對佢嚟講只係一個笑話。", "輸咗就認，唔好輸埋你個人格。", "你咁卑微，邊個會愛你？", "佢對你嘅好感一早過咗期，仲喺度等咩？"
    ];

    function applyTimeErosion() {
        const target = new Date(document.getElementById('targetDate').value || "2026-05-30");
        const today = new Date();
        const diffDays = Math.ceil((target - today) / 86400000);
        const remain = Math.max(0, diffDays);
        
        document.getElementById('daysLabel').innerText = remain;
        localStorage.setItem('mq_date', document.getElementById('targetDate').value);

        // 【關鍵：計算漸變比例】
        // ratio 為 0 (仲有好多日) -> 粉紅
        // ratio 為 1 (到咗 0 日) -> 漸變黑紅
        let ratio = 1 - (remain / maxDays);
        if (ratio < 0) ratio = 0;
        if (ratio > 1) ratio = 1;

        const root = document.documentElement;
        
        if (remain <= 0) {
            // 徹底黑化
            root.style.setProperty('--dynamic-bg', 'linear-gradient(180deg, #000000 0%, #3a0000 100%)');
            root.style.setProperty('--dynamic-text', '#ffffff');
            root.style.setProperty('--dynamic-accent', '#ff0000');
            root.style.setProperty('--dynamic-card', '#1a1a1a');
            document.getElementById('boxHint').innerText = "💀 終焉已至";
        } else {
            // 動態侵蝕：隨日子愈近，背景愈深
            const lightness = 95 - (85 * ratio); // 95% 變到 10%
            const saturation = 100 - (100 * ratio); // 彩度消失
            const accentRed = 255 - (100 * ratio); // 粉紅變深紅
            
            root.style.setProperty('--dynamic-bg', `hsl(0, ${saturation}%, ${lightness}%)`);
            root.style.setProperty('--dynamic-text', `hsl(0, 0%, ${Math.max(10, 40 - (30*ratio))}%)`);
            root.style.setProperty('--dynamic-accent', `rgb(${accentRed}, ${102 * (1-ratio)}, ${163 * (1-ratio)})`);
            root.style.setProperty('--dynamic-card', `rgba(255, 255, 255, ${1 - (0.9 * ratio)})`);
            document.getElementById('boxHint').innerText = "🎀 距離重生剩餘";
        }
    }

    function checkReality() {
        if (!document.getElementById('userInput').value.trim()) return;
        if (usedCount < 5) {
            usedCount++;
            localStorage.setItem('mq_used', usedCount);
            document.getElementById('energyStatus').innerText = `✨ 魔法能量：${5 - usedCount}`;
            document.getElementById('truth-content').innerText = truths[Math.floor(Math.random() * truths.length)];
            document.getElementById('truth-overlay').style.display = 'flex';
        } else {
            document.getElementById('pay-overlay').style.display = 'flex';
        }
    }

    function resetEnergy() {
        const btn = document.getElementById('subBtn');
        btn.innerText = "⏳ 正在核對過數流水...";
        setTimeout(() => {
            usedCount = 0;
            localStorage.setItem('mq_used', 0);
            location.reload();
        }, 3000);
    }

    // 初始化日期與顏色
    document.getElementById('targetDate').value = localStorage.getItem('mq_date') || "2026-05-30";
    applyTimeErosion();
</script>
</body>
</html>
